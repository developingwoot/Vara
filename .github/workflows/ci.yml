name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Vara.Api/Vara.Api.csproj

      - name: Build
        run: dotnet build src/Vara.Api/Vara.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests/Vara.Tests/Vara.Tests.csproj --no-build -c Release --logger "console;verbosity=minimal"

  frontend:
    name: Frontend — Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/vara-frontend/package-lock.json

      - name: Install
        working-directory: src/vara-frontend
        run: npm ci

      - name: Type check
        working-directory: src/vara-frontend
        run: npm run check

      - name: Build
        working-directory: src/vara-frontend
        run: npm run build

  docker-build:
    name: Docker — Build Verification
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t vara-api:ci src/Vara.Api/
