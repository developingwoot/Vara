services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vara
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../src/Vara.Api
      dockerfile: Dockerfile.dev
    volumes:
      - /src/bin
      - /src/obj
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=vara;Username=postgres;Password=postgres
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: vara-api
      Jwt__Audience: vara-client
      YouTube__ApiKey: ${YOUTUBE_API_KEY}
      Llm__Providers__Anthropic__ApiKey: ${ANTHROPIC_API_KEY}
      Llm__Providers__OpenAi__ApiKey: ${OPENAI_API_KEY}
      Llm__Providers__Groq__ApiKey: ${GROQ_API_KEY}
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Google__RedirectUri: http://localhost:5000/api/youtube/oauth/callback
      Frontend__BaseUrl: http://localhost:5173
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    develop:
      watch:
        # Sync source file changes into the container — dotnet watch picks them up
        - action: sync
          path: ../src/Vara.Api
          target: /src
          ignore:
            - bin/
            - obj/
        # Full image rebuild when dependencies change
        - action: rebuild
          path: ../src/Vara.Api/Vara.Api.csproj

volumes:
  postgres_data:
