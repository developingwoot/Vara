services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vara
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../src/Vara.Api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Database=vara;Username=postgres;Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: vara-api
      Jwt__Audience: vara-client
      YouTube__ApiKey: ${YOUTUBE_API_KEY}
      Llm__Providers__Anthropic__ApiKey: ${ANTHROPIC_API_KEY:-}
      Llm__Providers__OpenAi__ApiKey: ${OPENAI_API_KEY:-}
      Llm__Providers__Groq__ApiKey: ${GROQ_API_KEY:-}
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../src/vara-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # adapter-node reads ORIGIN at runtime for CSRF protection
      ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      # Proxy API requests to the api service
      API_URL: http://api:5000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
